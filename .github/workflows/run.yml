name: Scheduled Data Sync Worker

on:
  schedule:
    # Run every 5 hours to maintain continuous coverage
    - cron: '0 */5 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  run-sync:
    name: Execute Data Sync
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Run for up to 6 hours to cover the 5.5-hour execution loop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run worker script
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          TARGET_CONFIG: ${{ secrets.TARGET_CONFIG }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          RUN_INTERVAL_SECONDS: 120 # Run every 2 minutes
        run: python src/main.py
